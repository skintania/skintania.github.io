<!doctype html>
<html lang="th">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Skintania — Courses Materials</title>
    
    <style>body{display: none}</style>

    <script type="module" src="/auth-guard.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap');

        :root {
            --bg: #0f1724;
            --card: #0b1220;
            --accent: #3b82f6;
            --muted: #9aa4b2
        }

        body {
            margin: 0;
            font-family: 'Sukhumvit Set', 'Kanit', sans-serif, -apple-system, Segoe UI, Roboto, "Noto Sans", Arial;
            background: linear-gradient(180deg, #071029 0%, var(--bg) 100%);
            color: #e6eef8
        }

        .wrap {
            max-width: 1100px;
            margin: 48px auto;
            padding: 24px
        }

        h1 {
            margin: 0;
            font-size: 1.6rem
        }

        .banner {
            width: 100%;
            height: auto;
            max-height: 300px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 24px;
            box-shadow: 0 6px 18px rgba(2, 6, 23, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* สไตล์ปุ่มและการ์ด */
        .btn {
            display: block;
            text-align: center;
            margin-top: 12px;
            padding: 8px 12px;
            border-radius: 8px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        p.lead {
            margin: 6px 0 0;
            color: var(--muted)
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
            margin-top: 28px
        }

        .card {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(0, 0, 0, 0.06));
            padding: 18px;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(2, 6, 23, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: transform .18s, box-shadow .18s
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(2, 6, 23, 0.7)
        }

        .card h2 {
            margin: 0 0 6px;
            font-size: 1.05rem
        }

        .card p {
            margin: 0;
            color: var(--muted);
            font-size: 0.95rem
        }

        footer {
            margin-top: 40px;
            color: var(--muted);
            font-size: 0.9rem
        }
    </style>

    <link rel="stylesheet" href="/Assest/cmt.css">
    <link rel="stylesheet" href="/CourseMaterial/style.css">
    <link rel="icon" href="/Assest/sk-cu.png">
    <script type="module" src="/Template/component.js"></script>
    <script type="module" src="loadDrive.js"></script>
    <!-- PDF Reader icon-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <comment-widget></comment-widget>

    <main class="wrap">

        <site-header page-title="SKDrive" page-desc="ไฟล์สำหรับวิชาต่างๆ">
        </site-header>

        <div id="breadcrumbContainer" class="breadcrumb-container">
            <div class="breadcrumb-left">
                <button id="backBtn" class="back-btn"><i class="fa-solid fa-arrow-left"></i></button>
                <div id="currentPathText" class="path-text">Home</div>
            </div>
        
            <div class="breadcrumb-right">
                <button id="selectBtn" class="toggle-btn">
                    <i class="fa-solid fa-check-double"></i>
                    <span>Select</span>
                </button>
        
                <button id="downloadBtn" class="toggle-btn" style="display: none; background: #27ae60;">
                    <i class="fa-solid fa-download"></i>
                    <span>Download (<span id="selectedCount">0</span>)</span>
                </button>
        
                <button id="viewToggleBtn" class="toggle-btn">
                    <i class="fa-solid fa-list"></i>
                    <span>View</span>
                </button>
            </div>
        </div>

        <section id="coursesGrid" class="grid" aria-label="Courses">
        </section>

        <footer>
            <p>เรื่องแจ้ง น่ารู้</p>
            <ul style="color:var(--muted)">
                <!-- <li>วิชา Material ดูคลิป Lecture 14 - 16 ได้ นอกจากนั้นกำลังอัปขึ้น Cloudflare</li>
                <li>วิชา Physics ลงคลิปถึง Midterm 1</li>
                <li></li>
                <li>อันอื่นรอก่อนนๆ</li> -->
            </ul>
        </footer>
    </main>
</body>

</html>
