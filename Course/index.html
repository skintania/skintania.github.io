<!doctype html>
<html lang="th">

<head>
  <meta charset="utf-8">
  <meta name="description" content="คอร์สเรียนออนไลน์สำหรับ OSK CU Intania — Physics, Calculus, Material และอื่นๆ">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Skintania — Courses</title>

  <style>body { display: none }</style>

  <script type="module" src="/auth-guard.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap">
  <link rel="stylesheet" href="/global.css">
  <link rel="stylesheet" href="/Template/style.css">
  <link rel="stylesheet" href="/Course/style.css">
  <link rel="icon" href="/Assest/sk-cu.png">

  <script type="module" src="/Template/component.js" defer></script>
  <script type="module" src="/Course/loadCourse.js" defer></script>
</head>

<body>
  <comment-widget></comment-widget>

  <main class="wrap">
    <site-header page-title="Courses" page-desc="คอร์สเรียนทั้งหมด"></site-header>

    <div class="courses-layout">

      <!-- ── Toolbar + tag filter + grid ── -->
      <div class="courses-main">
        <div class="courses-toolbar">
          <div class="search-box">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
              viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input id="courseSearch" type="text" placeholder="ค้นหาคอร์ส..." autocomplete="off">
          </div>
          <span id="courseCount" class="course-count"></span>
          <button class="create-course-btn" id="createCourseBtn" hidden>
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            สร้างคอร์ส
          </button>
        </div>

        <!-- ── YouTube-style tag pills ── -->
        <div id="tagList" class="tag-list">
          <button class="tag-btn active" data-tag="all">ทั้งหมด</button>
          <!-- dynamic tags injected by JS -->
        </div>

        <section id="coursesGrid" class="yt-grid" aria-label="Courses">
          <div class="yt-skeleton"></div>
          <div class="yt-skeleton"></div>
          <div class="yt-skeleton"></div>
          <div class="yt-skeleton"></div>
        </section>

        <p id="emptyState" class="empty-state" hidden>ไม่พบคอร์สที่ค้นหา</p>
      </div>

    </div>

    <footer>
      <p>เรื่องแจ้ง น่ารู้</p>
      <ul></ul>
    </footer>
  </main>
  <!-- ── Create Course Modal ── -->
  <div class="modal-overlay" id="createModal" hidden>
    <div class="modal-box">
      <div class="modal-header">
        <h2 class="modal-title">สร้างคอร์สใหม่</h2>
        <button class="modal-close-btn" id="createModalClose">✕</button>
      </div>
      <form id="createCourseForm" class="modal-form">
        <label class="form-label">
          ชื่อคอร์ส <span class="req">*</span>
          <input class="form-input" type="text" id="ccTitle" placeholder="เช่น Physics 1 by PKen" required>
        </label>
        <label class="form-label">
          Folder <span class="req">*</span>
          <input class="form-input" type="text" id="ccFolder" placeholder="เช่น physics-1">
          <span class="form-hint">R2 key prefix สำหรับคลิปและไฟล์</span>
        </label>
        <label class="form-label">
          คำอธิบาย
          <input class="form-input" type="text" id="ccDesc" placeholder="Optional">
        </label>
        <label class="form-label">
          ประเภทคอร์ส
          <select class="form-input" id="ccType">
            <option value="video">🎬 วิดีโอ</option>
            <option value="exercise">📝 แบบฝึกหัด</option>
          </select>
        </label>
        <p class="form-error" id="ccError" hidden></p>
        <div class="modal-actions">
          <button type="button" class="btn-ghost" id="ccCancel">ยกเลิก</button>
          <button type="submit" class="btn" id="ccSubmit">สร้างคอร์ส</button>
        </div>
      </form>
    </div>
  </div>
</body>

</html>
