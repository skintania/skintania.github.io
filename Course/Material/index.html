<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intania-Material</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="cmt.css">

  <script src="cmt.js" defer></script>

  <link rel="icon" href="../Assest/sk-cu.png" type="image/jpg">

  <style>
    /* 1. CSS จัดหน้าตา Image Popup */
    .popup-overlay {
      display: flex;
      justify-content: center;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.3s ease;
    }

    .popup-content {
      position: relative;
      background-color: transparent;
      padding: 0;
      max-width: 90%;
      max-height: 90%;
    }

    .popup-content img {
      max-width: 100%;
      max-height: 85vh;
      display: block;
      border-radius: 8px;
      border: 2px solid white;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
    }

    /* ปุ่มปิด (กากบาท) */
    .close-btn {
      position: absolute;
      top: -15px;
      right: -15px;
      width: 35px;
      height: 35px;
      background-color: #ff0000;
      color: white;
      font-size: 24px;
      font-weight: bold;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid white;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
      z-index: 10000;
    }

    .close-btn:hover {
      background-color: #cc0000;
    }

    .hidden {
      display: none !important;
    }

    /* 2. CSS สำหรับ Sticky Popup (โลโก้ลอย) */
    .sticky-popup {
      position: fixed;
      top: 10px;
      left: 10px;
      width: 250px;
      background-color: transparent;
      z-index: 10000;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.5));
    }

    .sticky-popup img {
      width: 50%;
      height: auto;
      display: block;
      border-radius: 8px;
      opacity: 0.5;
      border: none;
    }

    @media (max-width: 768px) {
      .sticky-popup {
        width: 150px;
        top: 10px;
        left: 10px;
      }
    }
  </style>
</head>

<body>

  <div id="commentBtn">💬</div>

  <div id="commentPopup" class="hidden">
    <div class="popupBox">
      <h3>ส่งคำถาม / แจ้งปัญหา</h3>
      <textarea id="commentText" placeholder="พิมพ์ข้อความที่นี่..."></textarea>
      <div class="popupActions">
        <button onclick="sendComment()">ส่ง</button>
        <button onclick="togglePopup()">ปิด</button>
      </div>
    </div>
  </div>

  <div class="sticky-popup">
    <img src="../..//Assest/sk-cu.png" alt="เว็บนี้จัดทำโดยกุหลาบราชัน">
  </div>

  <div class="container">
    <div class="player">
      <video id="videoPlayer" controls></video>
    </div>
    <div class="catalog" id="catalog"></div>
  </div>

  <script type="module" src="player.js"></script>

</body>

</html>
