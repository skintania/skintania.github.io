<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ลืมรหัสผ่าน - Skintania</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="/config.js"></script>
</head>
<body>

  <main class="auth-wrap">
    <div class="card">
      <h1>ลืมรหัสผ่าน</h1>
      <p class="lead">ระบุรหัสนิสิตหรืออีเมลของคุณ <br>เพื่อรับรหัสยืนยันการตั้งรหัสผ่านใหม่</p>

      <form id="checkUserForm">
        <div class="form-group">
          <label for="identifier">รหัสนิสิต / อีเมล</label>
          <input type="text" id="identifier" class="form-control" placeholder="ตัวอย่าง: 6510XXXXXX หรือ email@me.com" required>
        </div>

        <button type="submit" class="btn" id="submitBtn">ถัดไป &rarr;</button>
      </form>

      <a href="/login/" class="auth-link" style="margin-top: 20px;">&larr; กลับไปหน้าเข้าสู่ระบบ</a>
    </div>
  </main>

  <script>
    document.getElementById("checkUserForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      
      const identifier = document.getElementById("identifier").value.trim();
      const btn = document.getElementById("submitBtn");
      
      btn.disabled = true;
      btn.innerText = "กำลังตรวจสอบบัญชี...";

      try {
        const response = await fetch(`${CONFIG.API_URL}/auth/forgot-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ identifier })
        });

        const result = await response.json();

        if (response.ok && result.success) {
          // เก็บอีเมลที่ Worker ค้นเจอไว้ใช้ในหน้าถัดไป
          sessionStorage.setItem("resetEmail", result.email);
          window.location.href = "reset-password.html";
        } else {
          alert("ผิดพลาด: " + (result.error || "ไม่พบข้อมูลผู้ใช้"));
          btn.disabled = false;
          btn.innerText = "ถัดไป &rarr;";
        }
      } catch (err) {
        alert("เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ กรุณาลองใหม่ครับ");
        btn.disabled = false;
        btn.innerText = "ถัดไป &rarr;";
      }
    });
  </script>

</body>
</html>
