<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ตั้งรหัสผ่านใหม่ - Skintania</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="/config.js"></script>
</head>
<body>

  <main class="auth-wrap">
    <div class="card">
      <h1>ตั้งรหัสผ่านใหม่</h1>
      <p class="lead">รหัส OTP ถูกส่งไปที่: <br><strong id="targetEmail" style="color: #2c3e50;">---</strong></p>

      <form id="resetPasswordForm">
        <div class="form-group">
          <label for="otp">รหัส OTP (6 หลัก)</label>
          <input type="text" id="otp" class="form-control" maxlength="6" inputmode="numeric" 
                 style="text-align: center; letter-spacing: 8px; font-size: 1.2rem;" placeholder="000000" required>
        </div>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

        <div class="form-group">
          <label for="newPassword">รหัสผ่านใหม่</label>
          <input type="password" id="newPassword" class="form-control" placeholder="อย่างน้อย 8 ตัวอักษร" minlength="8" required>
        </div>

        <div class="form-group">
          <label for="confirmPassword">ยืนยันรหัสผ่านใหม่</label>
          <input type="password" id="confirmPassword" class="form-control" placeholder="กรอกรหัสผ่านอีกครั้ง" required>
        </div>

        <button type="submit" class="btn" id="saveBtn">ยืนยันการเปลี่ยนรหัสผ่าน</button>
      </form>

      <p class="auth-link" style="font-size: 0.85rem; color: #888;">หากไม่ได้รับอีเมล โปรดเช็คใน Junk Mail หรือรอ 1 นาทีเพื่อลองใหม่</p>
    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const email = sessionStorage.getItem("resetEmail");
      
      // ถ้าไม่มีอีเมลในระบบความจำ (หลงหน้าเข้ามา) ให้เด้งกลับไปหน้าแรก
      if (!email) {
        window.location.replace("forgot-password.html");
        return;
      }

      document.getElementById("targetEmail").innerText = email;

      const form = document.getElementById("resetPasswordForm");
      
      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const otp = document.getElementById("otp").value.trim();
        const newPassword = document.getElementById("newPassword").value;
        const confirmPassword = document.getElementById("confirmPassword").value;
        const btn = document.getElementById("saveBtn");

        // เช็คว่ารหัสผ่านตรงกันไหม
        if (newPassword !== confirmPassword) {
          alert("รหัสผ่านใหม่ทั้งสองช่องไม่ตรงกันครับ");
          return;
        }

        btn.disabled = true;
        btn.innerText = "กำลังบันทึกรหัสผ่านใหม่...";

        try {
          const response = await fetch(`${CONFIG.API_URL}/auth/reset-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email: email,
              otp: otp,
              newPassword: newPassword
            })
          });

          const result = await response.json();

          if (response.ok && result.success) {
            sessionStorage.removeItem("resetEmail"); // ล้างข้อมูลทิ้งเพื่อความปลอดภัย
            window.location.replace("/login/");
          } else {
            alert("ผิดพลาด: " + (result.error || "ข้อมูลไม่ถูกต้อง"));
            btn.disabled = false;
            btn.innerText = "ยืนยันการเปลี่ยนรหัสผ่าน";
          }
        } catch (err) {
          alert("เชื่อมต่อเซิร์ฟเวอร์ไม่ได้");
          btn.disabled = false;
          btn.innerText = "ยืนยันการเปลี่ยนรหัสผ่าน";
        }
      });
    });
  </script>

</body>
</html>
