<!doctype html>
<html lang="th">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>เข้าสู่ระบบ - Skintania</title>
  <link rel="stylesheet" href="style.css">

  <script src="/config.js"></script>
</head>

<body>

  <main class="auth-wrap">
    <div class="card">
      <h1>เข้าสู่ระบบ</h1>
      <p class="lead">ยินดีต้อนรับกลับสู่ Skintania</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="student_id">รหัสนิสิต / อีเมล</label>
          <input type="text" id="student_id" name="student_id" class="form-control" placeholder="กรอกรหัสนิสิตหรืออีเมล"
            required>
        </div>

        <div class="form-group">
          <label for="password">รหัสผ่าน</label>
          <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn" id="loginBtn">เข้าสู่ระบบ</button>

        <div style="text-align: center; margin-top: 15px;">
          <a href="forgot-password.html" class="auth-link"
            style="font-size: 0.85rem; color: #888;">ลืมรหัสผ่านใช่ไหม?</a>
        </div>

        <div style="margin-top: 20px; display: flex; flex-direction: column; gap: 10px; text-align: center;">
          <a href="/register/" class="auth-link">ยังไม่มีบัญชีใช่ไหม? สมัครสมาชิกที่นี่</a>
        </div>
      </form>
      </div>
    </div>
  </main>

  <script type="module">
    import { CONFIG } from './config.js';
    
    document.addEventListener("DOMContentLoaded", () => {
      const loginForm = document.querySelector('form');

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault(); // ป้องกันการรีเฟรชหน้าเว็บ

        const emailOrUser = document.getElementById("student_id").value;
        const password = document.getElementById("password").value;

        const submitBtn = loginForm.querySelector('button[type="submit"]');
        const originalText = submitBtn.innerText;

        submitBtn.innerText = "กำลังเข้าสู่ระบบ...";
        submitBtn.disabled = true;

        try {
          const response = await fetch(`${CONFIG.API_URL}/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email: emailOrUser, // ใน Worker เราใช้ชื่อฟิลด์ email
              password: password
            })
          });

          const result = await response.json();

          if (response.ok && result.success) {
            // 1. เก็บ Token และข้อมูลผู้ใช้ลง localStorage
            localStorage.setItem("authToken", result.token);
            localStorage.setItem("username", result.username);
            localStorage.setItem("role", result.role);

            // 2. ส่งไปหน้า Dashboard หรือหน้าแรก (แก้ path ตามต้องการ)
            window.location.replace("/");
          } else {
            // 🚨 กรณีพิเศษ: ถ้ายังไม่ได้ยืนยัน OTP (Error 403 ที่เราเขียนไว้ใน Worker)
            if (response.status === 403) {
              alert(result.error);
              // ฝากอีเมลไว้ใน sessionStorage เพื่อให้หน้า verify-email ใช้งานได้
              sessionStorage.setItem("pendingVerificationEmail", emailOrUser);
              window.location.href = "/verify-email/"; // ส่งไปหน้ากรอก OTP
            } else {
              alert("ผิดพลาด: " + (result.error || "อีเมลหรือรหัสผ่านไม่ถูกต้อง"));
            }

            submitBtn.innerText = originalText;
            submitBtn.disabled = false;
          }
        } catch (error) {
          console.error("Login Error:", error);
          alert("ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้");
          submitBtn.innerText = originalText;
          submitBtn.disabled = false;
        }
      });
    });
  </script>

</body>

</html>
