<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Skintania — Event</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="/Assest/sk-cu.png">
    <script type="module" src="/auth-guard.js"></script>
    <script type="module" src="/Template/component.js" defer></script>
</head>
<body>
    <comment-widget></comment-widget>
    
    <main class="wrap">
        <site-header page-title="Event" page-desc="Event ต่างๆที่น่าสนใจสำหรับ SkIntania"></site-header>

        <div class="action-bar">
            <button id="openModalBtn" class="create-btn">
                <span>+</span> สร้างกิจกรรมใหม่
            </button>
        </div>

        <section id="coursesGrid" class="grid" aria-label="Courses"></section>

        <footer>
            <p>เรื่องแจ้ง น่ารู้</p>
            <ul style="color:var(--muted)">
                <li>ระบบรองรับการสร้าง Poll และ Activity แล้ว</li>
                <li>รูปภาพจัดเก็บผ่าน R2 Storage</li>
            </ul>
        </footer>
    </main>

    <div id="postModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>สร้างกิจกรรมใหม่</h2>
                <p>เลือกประเภทและกรอกข้อมูลให้ครบถ้วน</p>
            </div>
            
            <form id="createPostForm">
                <div class="form-group">
                    <label>หัวข้อกิจกรรม</label>
                    <input type="text" name="header" placeholder="เช่น โหวตเลือกเสื้อรุ่น" required>
                </div>

                <div class="form-group">
                    <label>ประเภท</label>
                    <select name="type" id="typeSelect">
                        <option value="Announcement">📢 ประกาศ (Announcement)</option>
                        <option value="Activity">🏃 กิจกรรม (Activity)</option>
                        <option value="Poll">📊 โพล (Poll)</option>
                    </select>
                </div>

                <div id="standardArea">
                    <div class="form-group">
                        <label>รายละเอียด</label>
                        <textarea name="description" rows="3" placeholder="เขียนรายละเอียดที่นี่..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>รูปภาพประกอบ (1 รูป)</label>
                        <input type="file" id="singleImageInput" name="singleImage" accept="image/*">
                    </div>
                </div>

                <div id="pollArea" style="display:none;">
                    <div class="form-group">
                        <label>จำนวนตัวเลือก</label>
                        <select id="pollCountSelect">
                            <option value="2">2 ตัวเลือก</option>
                            <option value="3">3 ตัวเลือก</option>
                            <option value="4">4 ตัวเลือก</option>
                            <option value="5">5 ตัวเลือก</option>
                        </select>
                    </div>
                    <div id="pollChoicesContainer"></div>
                </div>

                <div class="form-actions">
                    <button type="button" id="closeModalBtn" class="btn-cancel">ยกเลิก</button>
                    <button type="submit" id="submitBtn" class="btn-submit">โพสต์กิจกรรมเลย</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="loadEvent.js" defer></script>
    <script type="module" src="post-create.js" defer></script>
    <script type="module" src="post-config.js" defer></script>
</body>
</html>
