<!doctype html>
<html lang="th">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ยืนยันอีเมล - Skintania</title>

  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="auth-wrap">
    <div class="card">
      <h1>ยืนยันอีเมล</h1>
      <p class="lead">เราได้ส่งรหัส OTP 6 หลักไปที่อีเมลของคุณแล้ว<br>กรุณากรอกรหัสด้านล่างเพื่อยืนยันตัวตน</p>

      <form method="POST">
        
        <div class="form-group">
          <input type="text" id="otp" name="otp" class="form-control" 
                 style="text-align: center; letter-spacing: 12px; font-size: 1.4rem; font-weight: 500;" 
                 placeholder="------" 
                 maxlength="6" 
                 pattern="\d{6}" 
                 title="กรุณากรอกตัวเลข 6 หลัก" 
                 autocomplete="one-time-code" 
                 required>
        </div>

        <button type="submit" class="btn">ยืนยันรหัส OTP</button>
      </form>

      <a href="#" class="auth-link" style="margin-top: 24px;">ไม่ได้รับอีเมล? ส่งรหัสใหม่อีกครั้ง</a>
    </div>
  </main>

</body>

</html>
