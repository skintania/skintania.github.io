<!doctype html>
<html lang="th">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ยืนยันอีเมล - Skintania</title>
  <link rel="stylesheet" href="/global.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="auth-wrap">
    <div class="card">
      <h1>ยืนยันอีเมล</h1>
      <p class="lead">เราได้ส่งรหัส OTP 6 หลักไปที่<br><strong id="targetEmail" style="color:#e6eef8;">---</strong></p>

      <form id="otpForm">
        <div class="form-group">
          <input type="text" id="otp" name="otp" class="form-control"
            style="text-align:center; letter-spacing:12px; font-size:1.4rem; font-weight:500;"
            placeholder="------" maxlength="6" inputmode="numeric" autocomplete="one-time-code" required>
        </div>

        <button type="submit" class="btn" id="submitBtn">ยืนยันรหัส OTP</button>
      </form>

      <div id="statusMsg" style="display:none; margin-top:20px; padding:14px 16px; border-radius:8px; text-align:center; font-size:0.95rem;"></div>

      <a href="javascript:void(0);" id="resendBtn" class="auth-link" style="margin-top:24px;">
        ไม่ได้รับอีเมล? ส่งรหัสใหม่อีกครั้ง
      </a>
    </div>
  </main>

  <script type="module">
    import { CONFIG } from '/config.js';

    document.addEventListener("DOMContentLoaded", () => {
      const email = new URLSearchParams(window.location.search).get('email');

      if (!email) {
        window.location.replace("/login/");
        return;
      }

      document.getElementById("targetEmail").innerText = email;

      const form = document.getElementById("otpForm");
      const otpInput = document.getElementById("otp");
      const submitBtn = document.getElementById("submitBtn");
      const resendBtn = document.getElementById("resendBtn");
      const statusMsg = document.getElementById("statusMsg");

      otpInput.addEventListener('input', function () {
        this.value = this.value.replace(/[^0-9]/g, '');
      });

      function showStatus(success, html) {
        statusMsg.style.display = "block";
        if (success) {
          statusMsg.style.background = "rgba(34,197,94,0.12)";
          statusMsg.style.border = "1px solid rgba(34,197,94,0.3)";
          statusMsg.style.color = "#4ade80";
        } else {
          statusMsg.style.background = "rgba(239,68,68,0.12)";
          statusMsg.style.border = "1px solid rgba(239,68,68,0.3)";
          statusMsg.style.color = "#f87171";
        }
        statusMsg.innerHTML = html;
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const otpCode = otpInput.value.trim();
        if (otpCode.length !== 6) {
          showStatus(false, "✗ กรุณากรอกรหัส OTP ให้ครบ 6 หลัก");
          return;
        }

        submitBtn.innerText = "กำลังตรวจสอบ...";
        submitBtn.disabled = true;

        try {
          const response = await fetch(`${CONFIG.API_URL}/auth/verify-otp`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, otp: otpCode })
          });

          const result = await response.json();

          if (response.ok && result.success) {
            form.style.display = "none";
            resendBtn.style.display = "none";
            showStatus(true, "✓ ยืนยันอีเมลสำเร็จ!<br><span style='font-size:0.85rem;color:#9aa4b2;'>กำลังพาไปหน้าเข้าสู่ระบบใน 3 วินาที...</span>");
            setTimeout(() => window.location.replace("/login/"), 3000);
          } else {
            showStatus(false, "✗ " + (result.error || "รหัส OTP ไม่ถูกต้อง"));
            submitBtn.innerText = "ยืนยันรหัส OTP";
            submitBtn.disabled = false;
          }
        } catch (err) {
          showStatus(false, "✗ เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ กรุณาลองใหม่");
          submitBtn.innerText = "ยืนยันรหัส OTP";
          submitBtn.disabled = false;
        }
      });

      resendBtn.addEventListener("click", async (e) => {
        e.preventDefault();
        if (resendBtn.dataset.cooldown) return;

        resendBtn.innerText = "กำลังส่งรหัสใหม่...";
        resendBtn.dataset.cooldown = "1";

        try {
          const response = await fetch(`${CONFIG.API_URL}/auth/resend-otp`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email })
          });

          const result = await response.json();

          if (result.success) {
            showStatus(true, "✓ ส่งรหัส OTP ใหม่ไปที่อีเมลของคุณแล้ว");
            let counter = 60;
            resendBtn.innerText = `ส่งรหัสใหม่ได้อีกครั้งใน (${counter}s)`;
            const timer = setInterval(() => {
              counter--;
              resendBtn.innerText = `ส่งรหัสใหม่ได้อีกครั้งใน (${counter}s)`;
              if (counter <= 0) {
                clearInterval(timer);
                delete resendBtn.dataset.cooldown;
                resendBtn.innerText = "ไม่ได้รับอีเมล? ส่งรหัสใหม่อีกครั้ง";
              }
            }, 1000);
          } else {
            showStatus(false, "✗ " + (result.error || "ไม่สามารถส่งรหัสใหม่ได้"));
            delete resendBtn.dataset.cooldown;
            resendBtn.innerText = "ไม่ได้รับอีเมล? ส่งรหัสใหม่อีกครั้ง";
          }
        } catch (err) {
          showStatus(false, "✗ เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ กรุณาลองใหม่");
          delete resendBtn.dataset.cooldown;
          resendBtn.innerText = "ไม่ได้รับอีเมล? ส่งรหัสใหม่อีกครั้ง";
        }
      });
    });
  </script>

</body>

</html>
