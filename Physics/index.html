<!DOCTYPE html>
<html>

<head>
    <title>Physics Course</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="lang-toggle">
        <span>TH</span>

        <label class="switch">
            <input type="checkbox" id="langSwitch">
            <span class="slider"></span>
        </label>

        <span>ISE</span>
    </div>

    <h1 class="title"><span class="pink">General</span> <span class="blue">Physics</span></h1>

    <div class="grid">
        <div class="card" onclick="goTo('phy1')">
            <h2>Physics I</h2>
            <h4> File Below </h4>

                <div class="fileP" onclick="sheet(true)">
                    <p>File : Midterm</p>                    
                </div>
                <div class="fileB" onclick="sheet(false)">
                    <p>File : Final</p>                    
                </div>
            </div>
        </div>

        <div class="card" onclick="goTo('phy2')">
            <h2>Physics II</h2>
            <h4> File Below </h4>
            <div class="file-grid">
                <div class="fileP" onclick="">
                    <p>File : Midterm</p>                    
                </div>
                <div class="fileB" onclick="">
                    <p>File : Final</p>                    
                </div>
            </div>
        </div>
    </div>

    <div class="grid">
        <div class="card" onclick="goTo('lab1')">
            <h2>Lab Physics I</h2>
            <h4> File Below </h4>
        </div>

        <div class="card" onclick="goTo('lab2')">
            <h2>Lab Physics II</h2>
            <h4> File Below </h4>
        </div>
    </div>

    <script src="landing.js"></script>

</html>
