<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Player</title>

    <link rel="icon" href="../../Assest/sk-cu.png">
    <link rel="stylesheet" href="../assest/style.css">

    <link rel="stylesheet" href="../assest/cmt.css">
    <script src="../assest/cmt.js" defer></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #111;
            color: white;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* PLAYER */

        .player {
            flex: 3;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .player iframe {
            width: 95%;
            height: 90%;
            border: none;
            border-radius: 10px;
        }

        /* CATALOG */

        .catalog {
            flex: 1;
            background: #1b1b1b;
            overflow-y: auto;
        }

        .item {
            padding: 14px;
            border-bottom: 1px solid #333;
            cursor: pointer;
            transition: 0.2s;
        }

        /* LOGO */

        .sticky-popup {
            position: fixed;
            top: 10px;
            left: 10px;
            width: 200px;
            z-index: 10000;
        }

        .sticky-popup img {
            width: 50%;
            opacity: 0.5;
        }

        /* MOBILE */

        @media (max-width:768px) {

            .container {
                flex-direction: column;
            }

            .catalog {
                height: 250px;
            }

        }
    </style>
</head>

<!-- Floating Button -->
<div id="commentBtn">💬</div>

<!-- Popup -->
<div id="commentPopup" class="hidden">
  <div class="popupBox">
    <h3>ส่งคำถาม / แจ้งปัญหา</h3>
    
    <textarea id="commentText" placeholder="พิมพ์ข้อความที่นี่..."></textarea>
    
    <div class="popupActions">
      <button onclick="sendComment()">ส่ง</button>
      <button onclick="togglePopup()">ปิด</button>
    </div>
  </div>
</div>

<body>
    <div class="sticky-popup">
        <img src="../../Assest/sk-cu.png">
    </div>
    <div class="container">
        <div class="player">
            <iframe id="videoPlayer" allowfullscreen></iframe>
        </div>
        <div class="catalog" id="catalog"></div>
    </div>
    <script src="../assest/player.js"></script>
</body>

</html>
